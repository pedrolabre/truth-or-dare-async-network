<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cadastro - Truth or Dare</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#f5fbf6",
              "on-surface": "#171d1a",
              "surface-container-highest": "#dee4df",
              "outline": "#6d7a74",
              "tertiary-fixed-dim": "#ffb4ab",
              "surface-container-low": "#eff5f0",
              "primary-container": "#008466",
              "on-primary-fixed": "#002117",
              "tertiary-container": "#e6171e",
              "on-error-container": "#93000a",
              "surface-variant": "#dee4df",
              "secondary-fixed-dim": "#a5d0bd",
              "surface-dim": "#d6dbd7",
              "error-container": "#ffdad6",
              "secondary": "#3e6657",
              "on-surface-variant": "#3d4944",
              "primary-fixed": "#86f7d0",
              "on-primary-container": "#f5fff8",
              "tertiary": "#bb0011",
              "on-tertiary-fixed": "#410002",
              "surface-container-lowest": "#ffffff",
              "on-background": "#171d1a",
              "inverse-primary": "#68dbb4",
              "on-secondary-container": "#446c5d",
              "surface-container-high": "#e4eae5",
              "secondary-fixed": "#c0ecd9",
              "on-secondary-fixed": "#002117",
              "background": "#f5fbf6",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#00513d",
              "primary": "#006950",
              "on-secondary-fixed-variant": "#264e40",
              "surface-container": "#eaefea",
              "tertiary-fixed": "#ffdad6",
              "surface-tint": "#006c52",
              "primary-fixed-dim": "#68dbb4",
              "outline-variant": "#bccac2",
              "inverse-surface": "#2c322f",
              "on-tertiary-fixed-variant": "#93000a",
              "on-tertiary-container": "#fffbff",
              "on-error": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-primary": "#ffffff",
              "surface": "#f5fbf6",
              "secondary-container": "#c0ecd9",
              "inverse-on-surface": "#ecf2ed",
              "error": "#ba1a1a"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-brand-secondary { background-color: #5A8363; }
        .text-brand-tertiary { color: #D70015; }
        .bg-brand-tertiary { background-color: #D70015; }
        .border-brand-accent { border-color: #cff7ee; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface-bright font-body text-on-surface antialiased min-h-screen flex flex-col">
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-4 h-16 bg-brand-secondary dark:bg-slate-900 shadow-sm border-b border-[#cff7ee]/20">
<div class="flex items-center gap-2">
<span class="text-xl font-black text-[#f9f9f9] tracking-tight font-headline">Truth or Dare</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-4 pt-20 pb-10">
<div class="w-full max-w-md">
<div class="bg-surface-container-lowest rounded-xl shadow-xl overflow-hidden border border-outline-variant/30">
<div class="bg-brand-secondary p-8 text-center relative overflow-hidden">
<div class="absolute inset-0 opacity-10">
<svg class="w-full h-full" preserveaspectratio="none" viewbox="0 0 100 100">
<pattern height="10" id="grid" patternunits="userSpaceOnUse" width="10">
<path d="M 10 0 L 0 0 0 10" fill="none" stroke="white" stroke-width="0.5"></path>
</pattern>
<rect fill="url(#grid)" height="100" width="100"></rect>
</svg>
</div>
<h1 class="text-3xl font-extrabold text-[#f9f9f9] relative z-10 font-headline tracking-tight">Criar Conta</h1>
<p class="text-[#cff7ee] mt-2 font-medium opacity-90 relative z-10">Join the ultimate party game</p>
</div>
<div class="p-8 space-y-6">
<div class="space-y-4">
<div class="space-y-1">
<label class="block text-sm font-semibold text-on-surface-variant ml-1 font-label">Nome Completo</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-transparent outline-none transition-all" placeholder="Seu nome" type="text"/>
</div>
</div>
<div class="space-y-1">
<label class="block text-sm font-semibold text-on-surface-variant ml-1 font-label">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-transparent outline-none transition-all" placeholder="nome@exemplo.com" type="email"/>
</div>
</div>
<div class="space-y-1">
<label class="block text-sm font-semibold text-on-surface-variant ml-1 font-label">Senha</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-11 pr-12 py-3 bg-surface-container border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-transparent outline-none transition-all" placeholder="••••••••" type="password"/>
<button class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" data-icon="visibility">visibility</button>
</div>
</div>
</div>
<div class="flex items-start gap-3 px-1">
<div class="flex items-center h-5">
<input class="w-5 h-5 text-primary border-outline-variant rounded focus:ring-primary-container bg-surface-container cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="text-xs text-on-surface-variant leading-tight cursor-pointer" for="terms">Eu concordo com os <a class="text-primary font-bold hover:underline" href="#">Termos &amp; Condições</a> e a <a class="text-primary font-bold hover:underline" href="#">Política de Privacidade</a>.</label>
</div>
<button class="w-full py-4 bg-brand-tertiary text-[#f9f9f9] font-bold text-lg rounded-xl shadow-lg shadow-tertiary-container/20 hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2 group">
                        Começar a Jogar
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant"></div>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<p class="text-center text-sm font-medium text-on-surface-variant">
                        Já tem uma conta? <a class="text-primary font-bold hover:underline ml-1" href="#">Entre</a>
</p>
</div>
</div>
<div class="mt-8 grid grid-cols-3 gap-4 opacity-50">
<div class="h-1 bg-brand-secondary rounded-full"></div>
<div class="h-1 bg-brand-secondary rounded-full"></div>
<div class="h-1 bg-outline-variant rounded-full"></div>
</div>
</div>
</main>
<footer class="mt-auto pb-10 text-center">
<p class="text-xs font-bold text-outline tracking-widest uppercase">© 2026 Pedro Labre</p>
</footer>
</body></html>
