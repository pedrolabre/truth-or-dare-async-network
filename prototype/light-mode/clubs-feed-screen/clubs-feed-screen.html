<!DOCTYPE html>
<html class="light" lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Clubes - Truth or Dare</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "primary": "#5A8363",
                  "secondary": "#D70015",
                  "background": "#f5fbf6",
                  "surface": "#ffffff",
                  "on-surface": "#171d1a",
                  "outline": "#6d7a74",
                  "outline-variant": "#bccac2"
                },
                fontFamily: { "body": ["Inter"] },
              },
            },
          }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animação suave para o modal aparecer */
        @keyframes modalShow {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-modal { animation: modalShow 0.25s ease-out forwards; }
    </style>
</head>
<body class="bg-background text-on-background font-body h-screen flex flex-col overflow-hidden relative">

<header class="w-full shrink-0 flex items-center justify-between px-4 h-16 bg-[#5A8363] border-b border-[#cff7ee]/20 shadow-sm">
    <div class="flex items-center gap-3">
        <h1 class="font-bold text-lg text-[#cff7ee]">Truth or Dare</h1>
    </div>
    <div class="w-10 h-10 rounded-full bg-[#cff7ee]/20 flex items-center justify-center overflow-hidden border border-[#cff7ee]/40">
        <img alt="Perfil" class="w-full h-full object-cover" src="https://ui-avatars.com/api/?name=Ricardo+Mendes&background=eff5f0&color=002117"/>
    </div>
</header>

<main class="flex-1 w-full overflow-y-auto hide-scrollbar relative">
    <div class="max-w-2xl mx-auto px-4 py-6 space-y-6">
        
        <section>
            <h2 class="text-3xl font-extrabold text-[#171d1a] tracking-tight">Clubes</h2>
            <p class="text-on-surface-variant text-sm mt-1">Conecte-se com grupos e jogue junto.</p>
        </section>

        <div class="flex border-b border-outline-variant/30">
            <button id="btn-my-clubs" onclick="switchTab('my')" class="flex-1 py-3 text-sm font-bold border-b-2 border-primary text-primary transition-all">Meus Clubes</button>
            <button id="btn-discover-clubs" onclick="switchTab('discover')" class="flex-1 py-3 text-sm font-bold text-outline hover:text-primary transition-all">Descobrir</button>
        </div>

        <div id="search-area" class="hidden">
            <div class="relative">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline/60 text-lg">search</span>
                <input class="w-full pl-11 pr-4 py-3 bg-white border border-outline-variant/30 rounded-2xl text-sm focus:ring-primary focus:border-primary shadow-sm" placeholder="Buscar novos clubes..." type="text"/>
            </div>
        </div>

        <div id="clubs-container" class="space-y-4 pb-20"></div>
    </div>

    <button class="fixed bottom-24 right-6 w-16 h-16 bg-secondary text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform z-10 group">
        <span class="material-symbols-outlined group-hover:rotate-90 transition-transform duration-300" style="font-size: 32px;">add</span>
    </button>
</main>

<nav class="w-full shrink-0 flex justify-around items-center px-2 pb-safe h-20 bg-[#5A8363] border-t border-[#cff7ee]/10 shadow-[0_-2px_10px_rgba(0,0,0,0.1)] rounded-t-lg">
    <a class="flex flex-col items-center justify-center text-[#f9f9f9]/70 hover:text-[#f9f9f9] transition-colors px-3 py-1" href="#"><span class="material-symbols-outlined">style</span><span class="text-[12px] font-medium">Jogar</span></a>
    <a class="flex flex-col items-center justify-center text-[#f9f9f9]/70 hover:text-[#f9f9f9] transition-colors px-3 py-1" href="#"><span class="material-symbols-outlined">search</span><span class="text-[12px] font-medium">Descobrir</span></a>
    <a class="flex flex-col items-center justify-center bg-[#D70015] text-[#f9f9f9] rounded-xl px-3 py-1 shadow-md" href="#"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">groups</span><span class="text-[12px] font-medium">Clubes</span></a>
    <a class="flex flex-col items-center justify-center text-[#f9f9f9]/70 hover:text-[#f9f9f9] transition-colors px-3 py-1" href="#"><span class="material-symbols-outlined">person</span><span class="text-[12px] font-medium">Perfil</span></a>
</nav>

<div id="preview-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-[6px] transition-all p-6">
    <div class="bg-white w-full max-w-[340px] rounded-[32px] shadow-[0_20px_50px_rgba(0,0,0,0.3)] overflow-hidden relative animate-modal">
        
        <button id="close-preview" class="absolute top-4 right-4 bg-white/80 text-on-surface p-1 rounded-full shadow-md z-10 hover:bg-white active:scale-90 transition-all">
            <span class="material-symbols-outlined text-[18px]">close</span>
        </button>

        <div id="preview-cover" class="w-full h-24 bg-gradient-to-br from-primary to-[#86f7d0]"></div>

        <div class="px-6 pb-8 -mt-10 relative">
            <div class="flex flex-col items-center text-center">
                <div id="preview-icon" class="w-20 h-20 rounded-[24px] bg-white p-1.5 shadow-xl mb-4">
                    <div class="w-full h-full rounded-[18px] bg-secondary flex items-center justify-center text-white">
                        <span class="material-symbols-outlined text-4xl">groups</span>
                    </div>
                </div>
                <h3 id="preview-name" class="text-xl font-black text-on-surface uppercase tracking-tight leading-tight">Nome do Clube</h3>
                <p id="preview-membros" class="text-[11px] font-bold text-primary uppercase tracking-widest mt-1">0 membros</p>
            </div>

            <p id="preview-desc" class="text-sm text-on-surface-variant text-center font-medium mt-4 leading-relaxed line-clamp-3">
                Descrição do clube...
            </p>

            <div class="mt-6 flex items-center justify-center gap-2 py-2 px-4 bg-background rounded-2xl border border-outline-variant/20">
                <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                <span class="text-[10px] font-black text-primary uppercase tracking-tight">Desafios ativos agora</span>
            </div>

            <button class="w-full mt-6 bg-secondary text-white font-black py-4 rounded-2xl shadow-lg shadow-secondary/20 active:scale-95 hover:brightness-110 transition-all uppercase tracking-widest text-xs">
                Entrar no Clube
            </button>
        </div>
    </div>
</div>

<script>
    const myClubsData = `
        <article class="bg-white p-4 rounded-2xl border border-outline-variant/20 shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer">
            <div class="w-16 h-16 rounded-2xl bg-primary flex items-center justify-center text-white shrink-0"><span class="material-symbols-outlined text-3xl">sports_esports</span></div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-on-surface truncate uppercase tracking-tight text-sm">Midnight Gamers</h3>
                <p class="text-xs text-on-surface-variant line-clamp-1 mt-0.5">Desafios insanos toda sexta à noite!</p>
                <div class="flex items-center gap-3 mt-2">
                    <span class="flex items-center gap-1 text-[10px] font-bold text-outline uppercase"><span class="material-symbols-outlined text-xs">groups</span> 124 membros</span>
                    <span class="flex items-center gap-1 text-[10px] font-bold text-primary uppercase"><span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span> Ativo</span>
                </div>
            </div>
            <button class="p-2 text-primary"><span class="material-symbols-outlined">chevron_right</span></button>
        </article>
        <article class="bg-white p-4 rounded-2xl border border-outline-variant/20 shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer">
            <div class="w-16 h-16 rounded-2xl bg-[#D70015] flex items-center justify-center text-white shrink-0"><span class="material-symbols-outlined text-3xl">local_fire_department</span></div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-on-surface truncate uppercase tracking-tight text-sm">Clube dos Corajosos</h3>
                <p class="text-xs text-on-surface-variant line-clamp-1 mt-0.5">Só para quem não tem medo da verdade.</p>
                <div class="flex items-center gap-3 mt-2"><span class="flex items-center gap-1 text-[10px] font-bold text-outline uppercase"><span class="material-symbols-outlined text-xs">groups</span> 3.5k membros</span></div>
            </div>
            <button class="p-2 text-primary"><span class="material-symbols-outlined">chevron_right</span></button>
        </article>
        <article class="bg-white p-4 rounded-2xl border border-outline-variant/20 shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer">
            <div class="w-16 h-16 rounded-2xl bg-primary/20 flex items-center justify-center text-primary shrink-0"><span class="material-symbols-outlined text-3xl">school</span></div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-on-surface truncate uppercase tracking-tight text-sm">IFTO - Paraíso</h3>
                <p class="text-xs text-on-surface-variant line-clamp-1 mt-0.5">Grupo oficial do campus.</p>
                <div class="flex items-center gap-3 mt-2"><span class="flex items-center gap-1 text-[10px] font-bold text-outline uppercase"><span class="material-symbols-outlined text-xs">groups</span> 89 membros</span></div>
            </div>
            <button class="p-2 text-primary"><span class="material-symbols-outlined">chevron_right</span></button>
        </article>
    `;

    const discoverData = `
        <article onclick="openPreview('Festa sem Fim', '8.2k membros', 'celebration', 'bg-orange-500', 'Animação total para o fim de semana!')" class="bg-white p-4 rounded-2xl border border-outline-variant/20 shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer">
            <div class="w-16 h-16 rounded-2xl bg-orange-500 flex items-center justify-center text-white shrink-0"><span class="material-symbols-outlined text-3xl">celebration</span></div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-on-surface truncate uppercase tracking-tight text-sm">Festa sem Fim</h3>
                <p class="text-xs text-on-surface-variant line-clamp-1 mt-0.5">Sugestões de desafios para rolês.</p>
                <div class="flex items-center gap-3 mt-2"><span class="flex items-center gap-1 text-[10px] font-bold text-outline uppercase"><span class="material-symbols-outlined text-xs">groups</span> 8.2k membros</span></div>
            </div>
            <button class="px-4 py-1.5 bg-primary/10 text-primary text-xs font-bold rounded-full">Ver</button>
        </article>
        <article onclick="openPreview('Verdades Secretas', '12k membros', 'auto_awesome', 'bg-purple-600', 'A coragem de dizer a verdade custa caro!')" class="bg-white p-4 rounded-2xl border border-outline-variant/20 shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer mt-4">
            <div class="w-16 h-16 rounded-2xl bg-purple-600 flex items-center justify-center text-white shrink-0"><span class="material-symbols-outlined text-3xl">auto_awesome</span></div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-on-surface truncate uppercase tracking-tight text-sm">Verdades Secretas</h3>
                <p class="text-xs text-on-surface-variant line-clamp-1 mt-0.5">Perguntas proibidas e segredos.</p>
                <div class="flex items-center gap-3 mt-2"><span class="flex items-center gap-1 text-[10px] font-bold text-outline uppercase"><span class="material-symbols-outlined text-xs">groups</span> 12k membros</span></div>
            </div>
            <button class="px-4 py-1.5 bg-primary/10 text-primary text-xs font-bold rounded-full">Ver</button>
        </article>
        <article onclick="openPreview('Galo de Academia', '542 membros', 'fitness_center', 'bg-blue-500', 'Desafios para quem não pula o treino.')" class="bg-white p-4 rounded-2xl border border-outline-variant/20 shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer mt-4">
            <div class="w-16 h-16 rounded-2xl bg-blue-500 flex items-center justify-center text-white shrink-0"><span class="material-symbols-outlined text-3xl">fitness_center</span></div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-on-surface truncate uppercase tracking-tight text-sm">Galo de Academia</h3>
                <p class="text-xs text-on-surface-variant line-clamp-1 mt-0.5">Foco, força e desafios fitness.</p>
                <div class="flex items-center gap-3 mt-2"><span class="flex items-center gap-1 text-[10px] font-bold text-outline uppercase"><span class="material-symbols-outlined text-xs">groups</span> 542 membros</span></div>
            </div>
            <button class="px-4 py-1.5 bg-primary/10 text-primary text-xs font-bold rounded-full">Ver</button>
        </article>
    `;

    function switchTab(type) {
        const container = document.getElementById('clubs-container');
        const searchArea = document.getElementById('search-area');
        const btnMy = document.getElementById('btn-my-clubs');
        const btnDisc = document.getElementById('btn-discover-clubs');

        if (type === 'my') {
            container.innerHTML = myClubsData;
            searchArea.classList.add('hidden');
            btnMy.className = "flex-1 py-3 text-sm font-bold border-b-2 border-primary text-primary transition-all";
            btnDisc.className = "flex-1 py-3 text-sm font-bold text-outline hover:text-primary transition-all border-b-2 border-transparent";
        } else {
            container.innerHTML = discoverData;
            searchArea.classList.remove('hidden');
            btnDisc.className = "flex-1 py-3 text-sm font-bold border-b-2 border-primary text-primary transition-all";
            btnMy.className = "flex-1 py-3 text-sm font-bold text-outline hover:text-primary transition-all border-b-2 border-transparent";
        }
    }

    function openPreview(name, members, icon, colorClass, desc) {
        document.getElementById('preview-name').textContent = name;
        document.getElementById('preview-membros').textContent = members;
        document.getElementById('preview-desc').textContent = desc;
        const iconContainer = document.getElementById('preview-icon').firstElementChild;
        iconContainer.className = `w-full h-full rounded-[18px] flex items-center justify-center text-white ${colorClass}`;
        iconContainer.firstElementChild.textContent = icon;
        document.getElementById('preview-modal').classList.remove('hidden');
    }

    document.getElementById('close-preview').onclick = () => document.getElementById('preview-modal').classList.add('hidden');
    document.getElementById('preview-modal').onclick = (e) => { if(e.target.id === 'preview-modal') document.getElementById('preview-modal').classList.add('hidden'); }

    window.onload = () => switchTab('my');
</script>

</body>
</html>
