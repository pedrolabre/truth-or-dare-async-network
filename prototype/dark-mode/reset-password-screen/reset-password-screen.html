<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nova Senha - Truth or Dare</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-container": "#c0ecd9",
              "surface-variant": "#dee4df",
              "on-tertiary-fixed-variant": "#93000a",
              "on-background": "#FFFFFF",
              "on-error-container": "#93000a",
              "inverse-surface": "#2c322f",
              "on-tertiary-fixed": "#410002",
              "on-secondary": "#ffffff",
              "on-primary": "#ffffff",
              "error": "#ba1a1a",
              "outline-variant": "#bccac2",
              "tertiary-fixed-dim": "#ffb4ab",
              "surface-container": "#eaefea",
              "tertiary": "#bb0011",
              "primary-fixed-dim": "#68dbb4",
              "surface-container-low": "#eff5f0",
              "on-primary-container": "#f5fff8",
              "surface-tint": "#006c52",
              "surface": "#121212",
              "on-surface-variant": "#3d4944",
              "error-container": "#ffdad6",
              "tertiary-fixed": "#ffdad6",
              "on-secondary-fixed": "#002117",
              "primary-fixed": "#86f7d0",
              "surface-container-high": "#e4eae5",
              "on-primary-fixed-variant": "#00513d",
              "inverse-on-surface": "#ecf2ed",
              "secondary-fixed": "#c0ecd9",
              "on-error": "#ffffff",
              "on-surface": "#FFFFFF",
              "tertiary-container": "#e6171e",
              "primary": "#5A8363",
              "on-tertiary-container": "#fffbff",
              "on-secondary-fixed-variant": "#264e40",
              "on-secondary-container": "#446c5d",
              "secondary": "#3e6657",
              "background": "#121212",
              "surface-container-lowest": "#000000",
              "inverse-primary": "#68dbb4",
              "surface-dim": "#1a1a1a",
              "surface-container-highest": "#dee4df",
              "surface-bright": "#121212",
              "on-primary-fixed": "#002117",
              "secondary-fixed-dim": "#a5d0bd",
              "primary-container": "#008466",
              "outline": "#FFFFFF",
              "on-tertiary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neo-brutal-shadow {
            box-shadow: 4px 4px 0px 0px rgba(255,255,255,0.1);
        }
        .neo-brutal-shadow-black {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
        .active-interaction:active {
            transform: translate(1px, 1px);
            box-shadow: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-[#121212] text-white font-body antialiased min-h-screen flex flex-col">
<!-- TopAppBar Fragment -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-4 h-16 bg-[#121212] border-b-2 border-white">
<div class="text-xl font-black text-white">TRUTH OR DARE</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-12 px-6 max-w-md mx-auto w-full">
<!-- Hero Illustration -->
<div class="mb-8 w-full h-48 bg-zinc-800 border-2 border-white rounded-xl overflow-hidden relative">
<img alt="Security concept" class="w-full h-full object-cover grayscale mix-blend-multiply opacity-50" data-alt="Abstract minimalist illustration of a digital key and security shield in a clean neo-brutalist style with sharp lines" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDJYzLTzgmWnJqmFl1YKtgquWFNnaeISjnp0Xgqr_aQt-QVFtZXDhZ6stPG5OqRNNCmxBknMNK9c_p-pDXQNvzGj8ZvbwJqS7lV87_RfvVIyiR_DedgkczhgSjvgjHTSjt3fpySDJAja3H9R8y6iQiPEKTRnQUs3NzIuSVotz_esnInrRXHNhE5xcMsgwN9MZUpoVdolJm1Shm0tirir1w_HxeAcexwbNZG8qB-v2mpHyP-HAWrUBswkSG88y3fyu3v7g8iqALDjb6o"/>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-6xl text-white" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
</div>
<!-- Header Section -->
<div class="mb-8">
<h2 class="text-3xl font-black uppercase tracking-tight mb-3">NOVA SENHA</h2>
<p class="text-zinc-400 font-medium leading-relaxed">
                Crie uma senha forte e segura para proteger sua conta no Truth or Dare.
            </p>
</div>
<!-- Form Section -->
<form class="space-y-6">
<!-- New Password Input -->
<div class="space-y-2">
<label class="block text-xs font-black uppercase tracking-widest text-white ml-1">NOVA SENHA</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400" data-icon="lock">lock</span>
<input class="w-full h-14 pl-12 bg-transparent border-2 border-white rounded-xl focus:ring-0 focus:border-white placeholder:text-zinc-600 font-bold text-lg text-white" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password Input -->
<div class="space-y-2">
<label class="block text-xs font-black uppercase tracking-widest text-white ml-1">CONFIRMAR SENHA</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400" data-icon="lock">lock</span>
<input class="w-full h-14 pl-12 bg-transparent border-2 border-white rounded-xl focus:ring-0 focus:border-white placeholder:text-zinc-600 font-bold text-lg text-white" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Password Requirements -->
<div class="bg-zinc-900 border-2 border-white rounded-xl p-4 space-y-3">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#5A8363] text-sm" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-xs font-bold uppercase tracking-wider text-zinc-300">Mínimo 8 caracteres</span>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-zinc-600 text-sm" data-icon="radio_button_unchecked">radio_button_unchecked</span>
<span class="text-xs font-bold uppercase tracking-wider text-zinc-500">Uma letra maiúscula</span>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-zinc-600 text-sm" data-icon="radio_button_unchecked">radio_button_unchecked</span>
<span class="text-xs font-bold uppercase tracking-wider text-zinc-500">Um número</span>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full h-16 bg-[#5A8363] text-white rounded-xl border-2 border-white font-black uppercase tracking-widest flex items-center justify-center gap-3 active-interaction neo-brutal-shadow-black transition-all group" type="submit">
<span class="material-symbols-outlined" data-icon="vpn_key" style="font-variation-settings: 'FILL' 1;">vpn_key</span>
                REDEFINIR SENHA
            </button>
</form>
<!-- Footer Action -->
<div class="mt-8 text-center">
<a class="text-xs font-black uppercase tracking-widest text-zinc-500 hover:text-white transition-colors underline underline-offset-4 decoration-2" href="#">
                Cancelar
            </a>
</div>
</main>
</body></html>
