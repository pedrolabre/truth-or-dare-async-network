<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5A8363",
                        "background": "#121212",
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neo-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
        .neo-shadow-active:active {
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
            transform: translate(2px, 2px);
        }
    </style>
</head>
<body class="bg-[#121212] text-white font-body antialiased min-h-screen flex flex-col">
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-12">
<div class="w-full max-w-md space-y-10">
<!-- Branding/Illustration Section -->
<div class="flex flex-col items-center text-center space-y-6">
<div class="w-24 h-24 bg-primary border-2 border-white rounded-xl neo-shadow flex items-center justify-center">
<span class="material-symbols-outlined text-white text-5xl" data-icon="lock_reset">lock_reset</span>
</div>
<div class="space-y-3">
<h2 class="text-3xl font-black uppercase tracking-tighter text-white font-headline">
                        RECUPERAR ACESSO
                    </h2>
<p class="text-white font-medium max-w-[280px] mx-auto opacity-90">
                        Digite seu e-mail cadastrado para receber o código de verificação.
                    </p>
</div>
</div>
<!-- Form Section -->
<form class="space-y-6" onsubmit="return false;">
<div class="relative">
<label class="block text-xs font-bold uppercase mb-2 text-white tracking-widest" for="email">
                        Endereço de E-mail
                    </label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-white" data-icon="mail">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-[#121212] border-2 border-white rounded-xl text-white font-bold focus:ring-0 focus:outline-none placeholder:text-zinc-500 placeholder:font-normal transition-all" id="email" name="email" placeholder="Seu e-mail" type="email"/>
</div>
</div>
<button class="w-full h-14 bg-[#5A8363] text-white border-2 border-white rounded-xl font-bold uppercase tracking-widest flex items-center justify-center gap-3 neo-shadow neo-shadow-active transition-all" type="submit">
<span>ENVIAR CÓDIGO</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="text-center pt-2">
<a class="inline-flex items-center gap-2 text-white font-bold uppercase text-sm hover:underline decoration-2 underline-offset-4" href="#">
<span class="material-symbols-outlined text-sm font-bold" data-icon="login">login</span>
                    Voltar para o Login
                </a>
</div>
</div>
</main>
<!-- Visual Decoration Elements -->
<div class="fixed top-24 right-10 -z-10 opacity-[0.1] select-none pointer-events-none">
<span class="material-symbols-outlined text-[200px] text-white" data-icon="key">key</span>
</div>
<div class="fixed bottom-24 left-10 -z-10 opacity-[0.1] select-none pointer-events-none transform rotate-12">
<span class="material-symbols-outlined text-[150px] text-white" data-icon="shield">shield</span>
</div>
</body></html>
