<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Clubes - Truth or Dare</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "surface-bright": "#1a261f",
                  "on-surface": "#f9f9f9",
                  "surface-container-highest": "#334b3d",
                  "outline": "#78857e",
                  "surface-container-low": "#111a15",
                  "primary-container": "#008466",
                  "surface-variant": "#3b4a41",
                  "surface-dim": "#0e1511",
                  "on-surface-variant": "#b5c2bc",
                  "primary-fixed": "#86f7d0",
                  "background": "#121b16",
                  "primary": "#68dbb4",
                  "surface-container": "#1f3026",
                  "outline-variant": "#324038",
                  "surface": "#121b16",
                  "custom-green": "#5A8363",
                  "custom-red": "#D70015"
                },
                fontFamily: {
                  "headline": ["Inter"],
                  "body": ["Inter"],
                  "label": ["Inter"]
                },
                borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
              },
            },
          }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #121b16; }
        
        /* Animação do Modal atualizada para o padrão da Busca */
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-pop { animation: modalPop 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-background text-on-surface font-body h-screen flex flex-col overflow-hidden relative">

<header class="w-full shrink-0 flex items-center justify-between px-4 h-16 bg-[#5A8363] shadow-sm border-b border-white/10 z-20">
    <div class="flex items-center gap-3">
        <h1 class="font-bold text-lg text-white">Truth or Dare</h1>
    </div>
    <div class="w-8 h-8 rounded-full bg-surface-container-highest overflow-hidden border-2 border-white/30">
        <img alt="Perfil" class="w-full h-full object-cover" src="https://ui-avatars.com/api/?name=Ricardo+Mendes&background=1a261f&color=f9f9f9"/>
    </div>
</header>

<main class="flex-1 w-full overflow-y-auto hide-scrollbar relative z-0">
    <div class="max-w-2xl mx-auto px-4 py-6 space-y-6">
        
        <section>
            <h2 class="text-3xl font-extrabold text-white tracking-tight">Clubes</h2>
            <p class="text-on-surface-variant text-sm mt-1">Conecte-se com grupos e jogue junto.</p>
        </section>

        <div class="flex border-b border-outline-variant/50">
            <button id="btn-my-clubs" onclick="switchTab('my')" class="flex-1 py-3 text-sm font-bold border-b-2 border-primary text-primary transition-all">Meus Clubes</button>
            <button id="btn-discover-clubs" onclick="switchTab('discover')" class="flex-1 py-3 text-sm font-bold text-outline hover:text-primary transition-all border-b-2 border-transparent">Descobrir</button>
        </div>

        <div id="search-area" class="hidden mt-2">
            <div class="relative w-full">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none z-10">
                    <span class="material-symbols-outlined text-outline">search</span>
                </div>
                <input class="block w-full pl-12 pr-4 py-4 bg-surface-container border border-outline-variant/50 rounded-xl focus:ring-2 focus:ring-primary transition-all shadow-sm text-on-surface placeholder-outline text-sm" placeholder="Buscar novos clubes..." type="text"/>
            </div>
        </div>

        <div id="clubs-container" class="space-y-4 pb-24"></div>
    </div>

    <button class="fixed bottom-24 right-6 w-14 h-14 bg-[#D70015] text-white rounded-full shadow-[0_8px_20px_rgba(215,0,21,0.4)] flex items-center justify-center active:scale-90 transition-transform z-10 group">
        <span class="material-symbols-outlined group-hover:rotate-90 transition-transform duration-300" style="font-size: 28px;">add</span>
    </button>
</main>

<nav class="w-full shrink-0 flex justify-around items-center px-2 pb-safe h-20 bg-[#5A8363] rounded-t-xl shadow-[0_-8px_30px_rgba(0,0,0,0.5)] border-t border-white/10 mt-auto z-10">
    <a class="flex flex-col items-center justify-center text-white/70 hover:text-white transition-colors active:scale-90 px-3 py-1 cursor-pointer" href="#">
        <span class="material-symbols-outlined">style</span>
        <span class="text-[10px] font-bold uppercase mt-1">Jogar</span>
    </a>
    <a class="flex flex-col items-center justify-center text-white/70 hover:text-white transition-colors active:scale-90 px-3 py-1 cursor-pointer" href="#">
        <span class="material-symbols-outlined">search</span>
        <span class="text-[10px] font-bold uppercase mt-1">Buscar</span>
    </a>
    <a class="flex flex-col items-center justify-center bg-[#D70015] text-white rounded-xl px-5 py-2 active:scale-90 transition-transform cursor-pointer shadow-md" href="#">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">groups</span>
        <span class="text-[10px] font-bold uppercase mt-1">Clubes</span>
    </a>
    <a class="flex flex-col items-center justify-center text-white/70 hover:text-white transition-colors active:scale-90 px-3 py-1 cursor-pointer" href="#">
        <span class="material-symbols-outlined">person</span>
        <span class="text-[10px] font-bold uppercase mt-1">Você</span>
    </a>
</nav>

<div id="preview-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-[6px] transition-all p-6">
    <div class="bg-surface-container w-full max-w-[340px] rounded-[32px] shadow-[0_20px_50px_rgba(0,0,0,0.5)] overflow-hidden relative animate-pop border border-white/10">
        
        <button id="close-preview" class="absolute top-4 right-4 bg-surface-highest text-outline hover:text-on-surface hover:bg-surface-variant p-1.5 rounded-full shadow-md z-10 active:scale-90 transition-all border border-white/10">
            <span class="material-symbols-outlined text-[18px]">close</span>
        </button>

        <div id="preview-cover" class="w-full h-24 bg-gradient-to-br from-primary to-[#86f7d0]"></div>

        <div class="px-6 pb-8 -mt-10 relative">
            <div class="flex flex-col items-center text-center">
                <div id="preview-icon" class="w-20 h-20 rounded-[24px] bg-surface-container p-1.5 shadow-xl mb-4 border border-white/5">
                    <div class="w-full h-full rounded-[18px] flex items-center justify-center text-white">
                        <span class="material-symbols-outlined text-4xl">groups</span>
                    </div>
                </div>
                <h3 id="preview-name" class="text-xl font-black text-white uppercase tracking-tight leading-tight">Nome do Clube</h3>
                <p id="preview-membros" class="text-[11px] font-bold text-primary uppercase tracking-widest mt-1">0 membros</p>
            </div>

            <p id="preview-desc" class="text-sm text-on-surface-variant text-center font-medium mt-4 leading-relaxed line-clamp-3">
                Descrição do clube...
            </p>

            <div class="mt-6 flex items-center justify-center gap-2 py-2 px-4 bg-background rounded-2xl border border-white/5">
                <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                <span class="text-[10px] font-black text-primary uppercase tracking-tight">Desafios ativos agora</span>
            </div>

            <button class="w-full mt-6 bg-[#D70015] text-white font-black py-4 rounded-2xl shadow-lg shadow-[#D70015]/20 active:scale-95 transition-all uppercase tracking-widest text-xs hover:opacity-90">
                Entrar no Clube
            </button>
        </div>
    </div>
</div>

<script>
    // Templates de Clubes com as cores Tinged Dark Mode aplicadas
    const myClubsData = `
        <article class="bg-surface-container p-4 rounded-2xl border border-white/5 shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer hover:bg-surface-highest">
            <div class="w-16 h-16 rounded-2xl bg-primary/20 flex items-center justify-center text-primary shrink-0"><span class="material-symbols-outlined text-3xl">sports_esports</span></div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-white truncate uppercase tracking-tight text-sm">Midnight Gamers</h3>
                <p class="text-xs text-on-surface-variant line-clamp-1 mt-0.5">Desafios insanos toda sexta à noite!</p>
                <div class="flex items-center gap-3 mt-2">
                    <span class="flex items-center gap-1 text-[10px] font-bold text-outline uppercase"><span class="material-symbols-outlined text-xs">groups</span> 124 membros</span>
                    <span class="flex items-center gap-1 text-[10px] font-bold text-primary uppercase"><span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span> Ativo</span>
                </div>
            </div>
            <button class="p-2 text-outline hover:text-primary transition-colors"><span class="material-symbols-outlined">chevron_right</span></button>
        </article>
        <article class="bg-surface-container p-4 rounded-2xl border border-white/5 shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer hover:bg-surface-highest">
            <div class="w-16 h-16 rounded-2xl bg-[#D70015]/20 flex items-center justify-center text-[#ffb4ab] shrink-0"><span class="material-symbols-outlined text-3xl">local_fire_department</span></div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-white truncate uppercase tracking-tight text-sm">Clube dos Corajosos</h3>
                <p class="text-xs text-on-surface-variant line-clamp-1 mt-0.5">Só para quem não tem medo da verdade.</p>
                <div class="flex items-center gap-3 mt-2"><span class="flex items-center gap-1 text-[10px] font-bold text-outline uppercase"><span class="material-symbols-outlined text-xs">groups</span> 3.5k membros</span></div>
            </div>
            <button class="p-2 text-outline hover:text-primary transition-colors"><span class="material-symbols-outlined">chevron_right</span></button>
        </article>
        <article class="bg-surface-container p-4 rounded-2xl border border-white/5 shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer hover:bg-surface-highest">
            <div class="w-16 h-16 rounded-2xl bg-[#5A8363]/20 flex items-center justify-center text-primary shrink-0"><span class="material-symbols-outlined text-3xl">school</span></div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-white truncate uppercase tracking-tight text-sm">IFTO - Paraíso</h3>
                <p class="text-xs text-on-surface-variant line-clamp-1 mt-0.5">Grupo oficial do campus.</p>
                <div class="flex items-center gap-3 mt-2"><span class="flex items-center gap-1 text-[10px] font-bold text-outline uppercase"><span class="material-symbols-outlined text-xs">groups</span> 89 membros</span></div>
            </div>
            <button class="p-2 text-outline hover:text-primary transition-colors"><span class="material-symbols-outlined">chevron_right</span></button>
        </article>
    `;

    const discoverData = `
        <article onclick="openPreview('Festa sem Fim', '8.2k membros', 'celebration', 'bg-orange-500', 'Animação total para o fim de semana!')" class="bg-surface-container p-4 rounded-2xl border border-white/5 shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer hover:bg-surface-highest">
            <div class="w-16 h-16 rounded-2xl bg-orange-500 flex items-center justify-center text-white shrink-0"><span class="material-symbols-outlined text-3xl">celebration</span></div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-white truncate uppercase tracking-tight text-sm">Festa sem Fim</h3>
                <p class="text-xs text-on-surface-variant line-clamp-1 mt-0.5">Sugestões de desafios para rolês.</p>
                <div class="flex items-center gap-3 mt-2"><span class="flex items-center gap-1 text-[10px] font-bold text-outline uppercase"><span class="material-symbols-outlined text-xs">groups</span> 8.2k membros</span></div>
            </div>
            <button class="px-4 py-1.5 bg-primary/20 text-primary text-xs font-bold rounded-full">Ver</button>
        </article>
        <article onclick="openPreview('Verdades Secretas', '12k membros', 'auto_awesome', 'bg-purple-600', 'A coragem de dizer a verdade custa caro!')" class="bg-surface-container p-4 rounded-2xl border border-white/5 shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer hover:bg-surface-highest mt-4">
            <div class="w-16 h-16 rounded-2xl bg-purple-600 flex items-center justify-center text-white shrink-0"><span class="material-symbols-outlined text-3xl">auto_awesome</span></div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-white truncate uppercase tracking-tight text-sm">Verdades Secretas</h3>
                <p class="text-xs text-on-surface-variant line-clamp-1 mt-0.5">Perguntas proibidas e segredos.</p>
                <div class="flex items-center gap-3 mt-2"><span class="flex items-center gap-1 text-[10px] font-bold text-outline uppercase"><span class="material-symbols-outlined text-xs">groups</span> 12k membros</span></div>
            </div>
            <button class="px-4 py-1.5 bg-primary/20 text-primary text-xs font-bold rounded-full">Ver</button>
        </article>
        <article onclick="openPreview('Galo de Academia', '542 membros', 'fitness_center', 'bg-blue-500', 'Desafios para quem não pula o treino.')" class="bg-surface-container p-4 rounded-2xl border border-white/5 shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer hover:bg-surface-highest mt-4">
            <div class="w-16 h-16 rounded-2xl bg-blue-500 flex items-center justify-center text-white shrink-0"><span class="material-symbols-outlined text-3xl">fitness_center</span></div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-white truncate uppercase tracking-tight text-sm">Galo de Academia</h3>
                <p class="text-xs text-on-surface-variant line-clamp-1 mt-0.5">Foco, força e desafios fitness.</p>
                <div class="flex items-center gap-3 mt-2"><span class="flex items-center gap-1 text-[10px] font-bold text-outline uppercase"><span class="material-symbols-outlined text-xs">groups</span> 542 membros</span></div>
            </div>
            <button class="px-4 py-1.5 bg-primary/20 text-primary text-xs font-bold rounded-full">Ver</button>
        </article>
    `;

    function switchTab(type) {
        const container = document.getElementById('clubs-container');
        const searchArea = document.getElementById('search-area');
        const btnMy = document.getElementById('btn-my-clubs');
        const btnDisc = document.getElementById('btn-discover-clubs');

        if (type === 'my') {
            container.innerHTML = myClubsData;
            searchArea.classList.add('hidden');
            btnMy.className = "flex-1 py-3 text-sm font-bold border-b-2 border-primary text-primary transition-all";
            btnDisc.className = "flex-1 py-3 text-sm font-bold text-outline hover:text-primary transition-all border-b-2 border-transparent";
        } else {
            container.innerHTML = discoverData;
            searchArea.classList.remove('hidden');
            btnDisc.className = "flex-1 py-3 text-sm font-bold border-b-2 border-primary text-primary transition-all";
            btnMy.className = "flex-1 py-3 text-sm font-bold text-outline hover:text-primary transition-all border-b-2 border-transparent";
        }
    }

    function openPreview(name, members, icon, colorClass, desc) {
        document.getElementById('preview-name').textContent = name;
        document.getElementById('preview-membros').textContent = members;
        document.getElementById('preview-desc').textContent = desc;
        const iconContainer = document.getElementById('preview-icon').firstElementChild;
        iconContainer.className = `w-full h-full rounded-[18px] flex items-center justify-center text-white ${colorClass}`;
        iconContainer.firstElementChild.textContent = icon;
        document.getElementById('preview-modal').classList.remove('hidden');
    }

    document.getElementById('close-preview').onclick = () => document.getElementById('preview-modal').classList.add('hidden');
    document.getElementById('preview-modal').onclick = (e) => { if(e.target.id === 'preview-modal') document.getElementById('preview-modal').classList.add('hidden'); }

    window.onload = () => switchTab('my');
</script>

</body>
</html>
