<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Truth or Dare</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#121212",
              "on-surface": "#f5fbf6",
              "surface-container-highest": "#2c322f",
              "outline": "#8a938e",
              "tertiary-fixed-dim": "#ffb4ab",
              "surface-container-low": "#1a1c1a",
              "primary-container": "#5A8363",
              "on-primary-fixed": "#002117",
              "tertiary-container": "#D70015",
              "on-error-container": "#ffdad6",
              "surface-variant": "#3d4944",
              "secondary-fixed-dim": "#a5d0bd",
              "surface-dim": "#121212",
              "error-container": "#93000a",
              "secondary": "#5A8363",
              "on-surface-variant": "#bccac2",
              "primary-fixed": "#86f7d0",
              "on-primary-container": "#ffffff",
              "tertiary": "#D70015",
              "on-tertiary-fixed": "#410002",
              "surface-container-lowest": "#0b0d0b",
              "on-background": "#f5fbf6",
              "inverse-primary": "#006950",
              "on-secondary-container": "#c0ecd9",
              "surface-container-high": "#232926",
              "secondary-fixed": "#c0ecd9",
              "on-secondary-fixed": "#002117",
              "background": "#121212",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#00513d",
              "primary": "#5A8363",
              "on-secondary-fixed-variant": "#264e40",
              "surface-container": "#1e211f",
              "tertiary-fixed": "#ffdad6",
              "surface-tint": "#68dbb4",
              "primary-fixed-dim": "#68dbb4",
              "outline-variant": "#3d4944",
              "inverse-surface": "#f5fbf6",
              "on-tertiary-fixed-variant": "#93000a",
              "on-tertiary-container": "#ffffff",
              "on-error": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-primary": "#ffffff",
              "surface": "#121212",
              "secondary-container": "#3e6657",
              "inverse-on-surface": "#171d1a",
              "error": "#ffb4ab"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
<style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
</head>
<body class="bg-surface-bright font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-md flex flex-col items-center">
<!-- Brand Identity Section -->
<div class="text-center mb-12">
<div class="inline-flex items-center justify-center w-20 h-20 bg-secondary rounded-xl shadow-lg mb-6 rotate-3 relative">
  <span class="material-symbols-outlined text-7xl absolute" style="color: #121212; font-variation-settings: 'FILL' 1;">
    theater_comedy
  </span>
  
  <span class="material-symbols-outlined text-7xl absolute" style="color: #D70015; clip-path: inset(0 0 0 50%); font-variation-settings: 'FILL' 1;">
    theater_comedy
  </span>
</div>
<h1 class="text-3xl font-black tracking-tighter text-on-surface uppercase mb-1">
            TRUTH OR DARE
        </h1>
<p class="text-secondary font-bold tracking-[0.2em] text-xs uppercase">ARENA ASSÍNCRONA</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-4" onsubmit="return false;">
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-high border border-transparent focus:border-primary rounded-xl focus:ring-0 focus:bg-surface-container-lowest transition-all placeholder:text-outline/60 text-on-surface" placeholder="Nome de usuário" type="text"/>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</div>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-high border border-transparent focus:border-primary rounded-xl focus:ring-0 focus:bg-surface-container-lowest transition-all placeholder:text-outline/60 text-on-surface" placeholder="Senha" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end pt-1">
<a class="text-sm font-semibold text-secondary hover:text-on-surface transition-colors" href="#">Esqueceu a senha?</a>
</div>
<button class="w-full h-14 bg-tertiary text-on-tertiary font-black text-lg rounded-xl shadow-lg shadow-tertiary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4 uppercase" type="submit">ENTRAR <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span></button>
</form>
<!-- Social Auth Section -->
<div class="w-full mt-10">
<div class="relative flex items-center justify-center mb-8">
<div class="flex-grow border-t border-outline-variant"></div>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
</div>
<!-- Create Account Link -->
<div class="mt-12 text-center">
<p class="text-on-surface-variant font-medium">Não tem uma conta? <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Criar Conta</a></p>
</div>
</main>
<!-- Background Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none opacity-10">
<div class="absolute -top-20 -left-20 w-80 h-80 bg-primary-container rounded-full blur-[100px]"></div>
<div class="absolute top-1/2 -right-20 w-64 h-64 bg-secondary-container rounded-full blur-[80px]"></div>
<div class="absolute -bottom-20 left-1/4 w-96 h-96 bg-tertiary-container rounded-full blur-[120px]"></div>
</div>
</body></html>
